<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadtripper — Review Bids</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #F7F6F3; color: #1A1A18; padding: 24px 16px; }
  .rt-app { max-width: 600px; margin: 0 auto; background: #FFFFFF; border-radius: 16px; border: 1px solid #E5E2DC; overflow: hidden; }

  .rt-nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #E5E2DC; }
  .rt-logo { font-size: 18px; font-weight: 600; color: #1A1A18; letter-spacing: -0.3px; }
  .rt-logo span { color: #1D9E75; }

  /* Trip summary banner */
  .rt-trip-banner { background: #F5FBF8; border-bottom: 1px solid #D4EDE4; padding: 14px 20px; }
  .rt-trip-banner-route { font-size: 15px; font-weight: 700; color: #1A1A18; display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .rt-trip-banner-route svg { width: 14px; height: 14px; color: #1D9E75; }
  .rt-trip-banner-meta { font-size: 12px; color: #5F5E5A; display: flex; gap: 12px; flex-wrap: wrap; }
  .rt-bid-count { font-size: 12px; font-weight: 600; color: #085041; background: #E1F5EE; border: 1px solid #5DCAA5; border-radius: 999px; padding: 2px 10px; display: inline-flex; align-items: center; gap: 5px; margin-top: 8px; }
  .rt-bid-count svg { width: 12px; height: 12px; }

  /* Sort bar */
  .rt-sort-bar { display: flex; align-items: center; gap: 8px; padding: 12px 20px; border-bottom: 1px solid #E5E2DC; overflow-x: auto; }
  .rt-sort-label { font-size: 11px; color: #8C8A84; font-weight: 600; white-space: nowrap; }
  .rt-sort-chip { padding: 5px 12px; border-radius: 999px; font-size: 12px; border: 1px solid #E5E2DC; color: #5F5E5A; cursor: pointer; background: transparent; transition: all 0.15s; font-family: inherit; white-space: nowrap; }
  .rt-sort-chip.active { background: #E1F5EE; border-color: #5DCAA5; color: #085041; font-weight: 600; }

  /* Bid cards */
  .rt-bids-list { padding: 16px 20px; max-height: 68vh; overflow-y: auto; }
  .rt-bid-card { border: 1.5px solid #E5E2DC; border-radius: 14px; padding: 16px; margin-bottom: 14px; transition: border-color 0.15s; }
  .rt-bid-card:hover { border-color: #D8D5CD; }
  .rt-bid-card.new-bid { border-color: #5DCAA5; background: #F5FBF8; }

  .rt-bid-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
  .rt-driver-info { display: flex; align-items: center; gap: 10px; }
  .rt-driver-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: white; flex-shrink: 0; background: linear-gradient(135deg, #1D9E75, #5DCAA5); }
  .rt-driver-name { font-size: 14px; font-weight: 700; color: #1A1A18; margin-bottom: 2px; }
  .rt-driver-rating { font-size: 12px; color: #E8A33D; display: flex; align-items: center; gap: 4px; }
  .rt-driver-rating span { color: #5F5E5A; }
  .rt-new-badge { font-size: 10px; font-weight: 700; background: #D85A30; color: white; padding: 2px 7px; border-radius: 999px; flex-shrink: 0; }

  .rt-bid-price-block { text-align: right; flex-shrink: 0; }
  .rt-bid-price { font-size: 22px; font-weight: 700; color: #1A1A18; }
  .rt-bid-price.match { color: #0F6E56; }
  .rt-bid-price.counter { color: #5B8FD9; }
  .rt-bid-price-label { font-size: 10px; color: #8C8A84; margin-top: 1px; }
  .rt-bid-eta { font-size: 11px; color: #5F5E5A; margin-top: 3px; display: flex; align-items: center; gap: 3px; justify-content: flex-end; }
  .rt-bid-eta svg { width: 11px; height: 11px; }

  .rt-driver-details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .rt-detail-item { background: #FAFAF8; border: 1px solid #E5E2DC; border-radius: 8px; padding: 8px 10px; }
  .rt-detail-label { font-size: 10px; color: #8C8A84; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
  .rt-detail-val { font-size: 12px; color: #1A1A18; font-weight: 500; }

  /* Fatigue indicator */
  .rt-fatigue { display: flex; align-items: flex-start; gap: 7px; font-size: 11px; line-height: 1.5; padding: 8px 10px; border-radius: 8px; margin-bottom: 12px; }
  .rt-fatigue svg { width: 13px; height: 13px; flex-shrink: 0; margin-top: 1px; }
  .rt-fatigue.green { background: #E1F5EE; color: #085041; }
  .rt-fatigue.yellow { background: #FAF7EF; color: #7A6420; }
  .rt-fatigue.red { background: #FAECE7; color: #993C1D; }

  /* Badges */
  .rt-badge-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .rt-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 9px; border-radius: 999px; font-weight: 600; }
  .rt-badge.verified { background: #E1F5EE; color: #085041; border: 1px solid #5DCAA5; }
  .rt-badge.uber { background: #1A1A18; color: white; }
  .rt-badge.lyft { background: #EA0B8C; color: white; }
  .rt-badge svg { width: 11px; height: 11px; }

  /* Actions */
  .rt-bid-actions { display: flex; gap: 10px; }
  .rt-btn-accept-bid { flex: 1; padding: 11px; background: #1D9E75; color: #04342C; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
  .rt-btn-accept-bid:hover { opacity: 0.88; }
  .rt-btn-decline-bid { padding: 11px 16px; background: transparent; color: #B5483B; border: 1px solid #F0C4C0; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .rt-btn-decline-bid:hover { background: #FAECE7; }
  .rt-btn-view-profile { padding: 11px 16px; background: transparent; color: #5F5E5A; border: 1px solid #E5E2DC; border-radius: 10px; font-size: 13px; cursor: pointer; font-family: inherit; }

  .rt-btn-counter-bid { padding: 11px 14px; background: #EAF1FB; color: #2E5A94; border: 1px solid #8AB4E8; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .rt-btn-counter-bid:hover { background: #D6E8F7; }

  /* Accepted state */
  .rt-accepted-banner { display: none; background: #E1F5EE; border: 1px solid #5DCAA5; border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; }
  .rt-accepted-banner.show { display: flex; align-items: center; gap: 10px; }
  .rt-accepted-banner svg { width: 18px; height: 18px; color: #0F6E56; flex-shrink: 0; }
  .rt-accepted-title { font-size: 13px; font-weight: 700; color: #085041; }
  .rt-accepted-sub { font-size: 11px; color: #0F6E56; margin-top: 1px; }

  .rt-toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #085041; color: #9FE1CB; padding: 11px 20px; border-radius: 10px; font-size: 13px; z-index: 100; white-space: nowrap; }
  .rt-toast.show { display: block; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #D8D5CD; border-radius: 3px; }
</style>
</head>
<body>

<div class="rt-app">
  <nav class="rt-nav">
    <div class="rt-logo">road<span>tripper</span></div>
  </nav>

  <!-- Trip summary -->
  <div class="rt-trip-banner">
    <div class="rt-trip-banner-route">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Doral, FL
      <svg style="width:12px;height:12px;color:#8C8A84;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      Jacksonville, FL
    </div>
    <div class="rt-trip-banner-meta">
      <span>Jun 20 · 6:00 AM</span>
      <span>3 passengers · 3+ bags</span>
      <span>Your offer: $420</span>
    </div>
    <div class="rt-bid-count">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      3 drivers responded · 2 new
    </div>
  </div>

  <!-- Sort bar -->
  <div class="rt-sort-bar">
    <span class="rt-sort-label">Sort:</span>
    <button class="rt-sort-chip active" onclick="sortBids('newest')">Newest first</button>
    <button class="rt-sort-chip" onclick="sortBids('price-low')">Lowest price</button>
    <button class="rt-sort-chip" onclick="sortBids('rating')">Highest rated</button>
    <button class="rt-sort-chip" onclick="sortBids('eta')">Fastest ETA</button>
  </div>

  <div class="rt-bids-list">
    <div id="accepted-banner" class="rt-accepted-banner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
      <div>
        <div class="rt-accepted-title">Driver accepted — trip confirmed!</div>
        <div class="rt-accepted-sub">You'll receive a confirmation with full trip details.</div>
      </div>
    </div>
    <div id="bids-container"></div>
  </div>
</div>

<div id="toast" class="rt-toast"></div>

<script>
const BIDS = [
  {
    id: 'bid-1', initials: 'RM', avatarColor: 'linear-gradient(135deg,#1D9E75,#5DCAA5)',
    name: 'Rafael M.', rating: 4.9, trips: 142, isNew: true,
    price: 395, type: 'counter', eta: 15,
    platform: 'uber', platformRating: 4.9, platformLabel: 'Uber verified',
    vehicle: '2023 Hyundai Sonata', vehicleType: 'Standard sedan',
    onTime: 96, since: 'Mar 2026',
    fatigue: 'green', fatigueText: 'No prior trips today — fresh driver',
    currentOffer: 395
  },
  {
    id: 'bid-2', initials: 'PS', avatarColor: 'linear-gradient(135deg,#5B8FD9,#8AB4E8)',
    name: 'Patricia S.', rating: 4.8, trips: 87, isNew: true,
    price: 420, type: 'match', eta: 22,
    platform: 'lyft', platformRating: 4.8, platformLabel: 'Lyft verified',
    vehicle: '2022 Toyota Sienna', vehicleType: 'Full-size minivan',
    onTime: 94, since: 'Jan 2026',
    fatigue: 'yellow', fatigueText: '<strong>Return trip.</strong> 3.5 hrs logged today · Last trip ended 4 hrs ago — use your judgment',
    currentOffer: 420
  },
  {
    id: 'bid-3', initials: 'DK', avatarColor: 'linear-gradient(135deg,#8C8A84,#B5B2AA)',
    name: 'David K.', rating: 4.4, trips: 53, isNew: false,
    price: 380, type: 'counter', eta: 35,
    platform: 'uber', platformRating: 4.4, platformLabel: 'Uber verified',
    vehicle: '2020 Chevrolet Tahoe', vehicleType: 'Full-size SUV',
    onTime: 88, since: 'Feb 2026',
    fatigue: 'red', fatigueText: '<strong>High fatigue risk.</strong> 6.2 hrs logged today · Last trip ended 45 min ago — consider a different driver',
    currentOffer: 380
  }
];

// Track declined and accepted bids
const declined = new Set();
let acceptedId = null;
let currentSort = 'newest';

function renderBids() {
  const list = document.getElementById('bids-container');
  let sorted = [...BIDS].filter(b => !declined.has(b.id));

  if (currentSort === 'newest') sorted = sorted; // already in order
  else if (currentSort === 'price-low') sorted.sort((a,b) => a.currentOffer - b.currentOffer);
  else if (currentSort === 'rating') sorted.sort((a,b) => b.rating - a.rating);
  else if (currentSort === 'eta') sorted.sort((a,b) => a.eta - b.eta);

  list.innerHTML = sorted.map(b => {
    const priceColor = b.type === 'match' ? '#0F6E56' : '#5B8FD9';
    const priceLabel = b.type === 'match' ? 'your price ✓' : 'counter bid';
    const platformBadge = b.platform === 'uber'
      ? `<span class="rt-badge uber"><svg viewBox="0 0 24 24" fill="currentColor" style="width:11px;height:11px;"><circle cx="12" cy="12" r="10"/></svg>${b.platformLabel} · ${b.platformRating}★</span>`
      : `<span class="rt-badge lyft">${b.platformLabel} · ${b.platformRating}★</span>`;
    const isAccepted = acceptedId === b.id;
    const stars = '★'.repeat(Math.floor(b.rating)) + (b.rating % 1 >= 0.5 ? '★' : '☆');

    return `<div class="rt-bid-card ${b.isNew && !isAccepted ? 'new-bid' : ''}" id="${b.id}" style="${isAccepted ? 'border-color:#1D9E75;background:#F5FBF8;' : ''}">
      <div class="rt-bid-header">
        <div class="rt-driver-info">
          <div class="rt-driver-avatar" style="background:${b.avatarColor}">${b.initials}</div>
          <div>
            <div class="rt-driver-name">${b.name}</div>
            <div class="rt-driver-rating">${stars} <span>${b.rating} · ${b.trips} trips</span></div>
          </div>
        </div>
        <div>
          ${b.isNew && !isAccepted ? '<span class="rt-new-badge">NEW</span>' : ''}
          <div class="rt-bid-price-block" style="margin-top:${b.isNew?'6px':'0'};">
            <div class="rt-bid-price" style="color:${priceColor};">$${b.currentOffer}</div>
            <div class="rt-bid-price-label">${priceLabel}</div>
            <div class="rt-bid-eta"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>ETA ${b.eta} min</div>
          </div>
        </div>
      </div>
      <div class="rt-badge-row">
        ${platformBadge}
        <span class="rt-badge verified"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px;"><path d="M20 6L9 17l-5-5"/></svg>ID verified</span>
      </div>
      <div class="rt-driver-details">
        <div class="rt-detail-item"><div class="rt-detail-label">Vehicle</div><div class="rt-detail-val">${b.vehicle}</div></div>
        <div class="rt-detail-item"><div class="rt-detail-label">Type</div><div class="rt-detail-val">${b.vehicleType}</div></div>
        <div class="rt-detail-item"><div class="rt-detail-label">On-time rate</div><div class="rt-detail-val">${b.onTime}%</div></div>
        <div class="rt-detail-item"><div class="rt-detail-label">Member since</div><div class="rt-detail-val">${b.since}</div></div>
      </div>
      <div class="rt-fatigue ${b.fatigue}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;flex-shrink:0;margin-top:1px;">${b.fatigue === 'green'
          ? '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'
          : '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>'}
        </svg>
        <span>${b.fatigueText}</span>
      </div>
      ${isAccepted
        ? `<div style="font-size:13px;font-weight:600;color:#085041;display:flex;align-items:center;gap:6px;padding:10px 0;justify-content:center;">
            <svg style="width:16px;height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
            Confirmed with ${b.name} at $${b.currentOffer}
          </div>`
        : `<div id="counter-panel-${b.id}" style="display:none;margin-bottom:10px;">
            <div style="font-size:12px;font-weight:600;color:#1A1A18;margin-bottom:6px;">Your counter offer</div>
            <div style="display:flex;gap:8px;align-items:center;">
              <div style="display:flex;align-items:center;gap:4px;flex:1;border:1px solid #E5E2DC;border-radius:8px;padding:8px 10px;background:#FAFAF8;">
                <span style="font-size:14px;color:#5F5E5A;">$</span>
                <input type="number" id="counter-input-${b.id}" placeholder="${b.currentOffer}" min="1" style="border:none;outline:none;font-size:14px;font-family:inherit;width:100%;background:transparent;" />
              </div>
              <button onclick="sendCounter('${b.id}')" style="padding:9px 16px;background:#1D9E75;color:#04342C;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;">Send</button>
              <button onclick="toggleCounter('${b.id}')" style="padding:9px 12px;background:transparent;border:1px solid #E5E2DC;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;color:#5F5E5A;">✕</button>
            </div>
            <div style="font-size:11px;color:#8C8A84;margin-top:5px;">Driver will be notified and can accept or counter again.</div>
          </div>
          <div class="rt-bid-actions">
            <button class="rt-btn-view-profile" onclick="showToast('Opening ${b.name}\'s full profile')">Profile</button>
            <button class="rt-btn-decline-bid" onclick="declineBid('${b.id}','${b.name}')">Decline</button>
            <button class="rt-btn-counter-bid" onclick="toggleCounter('${b.id}')">Counter</button>
            <button class="rt-btn-accept-bid" onclick="acceptBid('${b.id}','${b.name}','$${b.currentOffer}')">Accept $${b.currentOffer}</button>
          </div>`
      }
    </div>`;
  }).join('');

  // Add declined cards at bottom, greyed out
  declined.forEach(id => {
    const b = BIDS.find(x => x.id === id);
    if (!b) return;
    list.innerHTML += `<div class="rt-bid-card" style="opacity:0.35;pointer-events:none;">
      <div class="rt-bid-header">
        <div class="rt-driver-info">
          <div class="rt-driver-avatar" style="background:${b.avatarColor}">${b.initials}</div>
          <div><div class="rt-driver-name">${b.name}</div><div class="rt-driver-rating" style="color:#B5B2AA;">Bid declined</div></div>
        </div>
        <div class="rt-bid-price-block"><div class="rt-bid-price" style="color:#B5B2AA;">$${b.currentOffer}</div></div>
      </div>
    </div>`;
  });
}

function sortBids(method) {
  currentSort = method;
  document.querySelectorAll('.rt-sort-chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  renderBids();
}

function toggleCounter(bidId) {
  const panel = document.getElementById('counter-panel-' + bidId);
  if (!panel) return;
  const isOpen = panel.style.display === 'block';
  panel.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) document.getElementById('counter-input-' + bidId)?.focus();
}

function sendCounter(bidId) {
  const input = document.getElementById('counter-input-' + bidId);
  const val = parseInt(input?.value);
  if (!val || val < 1) { showToast('Enter a valid counter amount'); return; }
  const bid = BIDS.find(b => b.id === bidId);
  if (!bid) return;
  const prev = bid.currentOffer;
  bid.currentOffer = val;
  bid.type = 'counter';
  bid.isNew = false;
  showToast(`Counter of $${val} sent to ${bid.name} — was $${prev}`);
  renderBids();
}

function acceptBid(bidId, name, price) {
  acceptedId = bidId;
  const banner = document.getElementById('accepted-banner');
  banner.classList.add('show');
  renderBids();
  banner.scrollIntoView({ behavior: 'smooth', block: 'start' });
  showToast(`Trip confirmed with ${name} at ${price}`);
}

function declineBid(bidId, name) {
  declined.add(bidId);
  renderBids();
  showToast(`${name}'s bid declined`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.addEventListener('DOMContentLoaded', renderBids);
</script>
</body>
</html>
